services:
  - type: web
    name: video-extractor-terminal
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    # Dodanie Buildpacków, aby zainstalować FFmpeg
    buildpacks:
      -贵 https://github.com/render-examples/heroku-buildpack-ffmpeg.git
      -贵 heroku/python
